[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lazycrawler"
version = "0.2.0"
description = "Web crawler + search with pure (no-LLM) and smart (LazyBridge LLM) modes, SQLite persistence and 3-level dedup."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "selvaz" }]
keywords = ["web-crawler", "web-search", "llm", "lazybridge", "trafilatura"]

# Core: il minimo per la PURE mode (nessun LLM).
dependencies = [
    "requests>=2.28",
    "beautifulsoup4>=4.11",
    "trafilatura>=1.6",
    "pydantic>=2.0",
]

[project.optional-dependencies]
# SMART mode: estrazione/selezione via LazyBridge. Aggiungi l'extra del provider.
smart = ["lazybridge>=0.9"]
# Estrazione PDF (remota): PyMuPDF primario, pypdf fallback, pdfplumber tabelle.
pdf = ["pymupdf>=1.23", "pypdf>=4.0", "pdfplumber>=0.10"]
# WebSearch via DuckDuckGo.
search = ["ddgs>=2.0"]
# JavaScript rendering (SPAs) via a headless browser.
js = ["playwright>=1.40"]
# Blacklist domini da file Excel.
excel = ["openpyxl>=3.1"]
# Parsing date robusto (estrazione published_iso).
dates = ["python-dateutil>=2.8"]
# Tutto.
all = [
    "lazybridge>=0.9",
    "pymupdf>=1.23", "pypdf>=4.0", "pdfplumber>=0.10",
    "ddgs>=2.0", "playwright>=1.40", "openpyxl>=3.1", "python-dateutil>=2.8",
]

[project.urls]
Repository = "https://github.com/selvaz/lazycrawler"

[tool.setuptools]
packages = ["lazycrawler"]
