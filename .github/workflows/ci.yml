name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + offline test extras
        # The offline suite (-m "not integration") needs the non-LLM extras only.
        # The `smart`/`all` extra pulls lazybridge>=0.9 which requires Python
        # >=3.11, so installing it would break the 3.10 leg of the matrix.
        # LazyBridge-dependent tests are integration-marked and skipped here.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[pdf,search,excel,dates,dev]"

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Tests (pytest, offline)
        run: pytest -m "not integration" -q

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build & check the package
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
