name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + offline test extras
        # The offline suite (-m "not integration") exercises the non-LLM extras.
        # `nlp`/`markdown`/`image` are included so the ml content-extraction,
        # markdown and artifact-image paths run in CI. `async` (aiohttp) and
        # `domains` (tldextract) are included so the async redirect/SSRF hardening
        # and registrable-domain scope are exercised. `smart`/`all` pull
        # lazybridge>=0.9 (Python >=3.11) and are integration-marked, so they are
        # skipped here. `ml` (model2vec) is omitted: it would download a ~30MB
        # model over the network at test time; the offline lexical/structural
        # fallback path is what CI exercises. `js` (Playwright) is mocked in tests.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[pdf,search,excel,dates,markdown,image,nlp,async,domains,dev]"

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Tests (pytest, offline)
        run: pytest -m "not integration" -q

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build & check the package
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
